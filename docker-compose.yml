services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rodadua-app
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./docker/php.ini:/usr/local/etc/php/conf.d/rodadua.ini
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - rodadua
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: rodadua
      DB_USERNAME: rodadua
      DB_PASSWORD: rodadua_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_ENV: production
      APP_DEBUG: "false"

  mysql:
    image: mysql:8.0
    container_name: rodadua-mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: rodadua
      MYSQL_USER: rodadua
      MYSQL_PASSWORD: rodadua_secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
    networks:
      - rodadua

  redis:
    image: redis:7-alpine
    container_name: rodadua-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - rodadua

networks:
  rodadua:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
