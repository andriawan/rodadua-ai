openapi: 3.0.3
info:
  title: rodaduaAI API
  description: AI-Powered Motorcycle Assistant for Indonesian Riders
  version: 1.0.0
  contact:
    name: rodaduaAI Team

servers:
  - url: http://localhost:8000/api/v1
    description: Local development
  - url: https://api.rodadua.ai/api/v1
    description: Production

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data: {}

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: object

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        last_page:
          type: integer

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        created_at:
          type: string
          format: date-time

    Motorcycle:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        brand:
          type: string
        model:
          type: string
        year:
          type: integer
        color:
          type: string
        license_plate:
          type: string
        engine_cc:
          type: integer
        transmission:
          type: string
        fuel_type:
          type: string
        odometer_km:
          type: integer
        status:
          type: string
        is_favorite:
          type: boolean
        created_at:
          type: string
          format: date-time

    TroubleshootingResult:
      type: object
      properties:
        id:
          type: integer
        motorcycle_id:
          type: integer
        problem_description:
          type: string
        ai_analysis:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
        created_at:
          type: string
          format: date-time

paths:
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirmation]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                password_confirmation:
                  type: string
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        properties:
                          user:
                            $ref: '#/components/schemas/User'
                          token:
                            type: string

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login with credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials

  /auth/user:
    get:
      tags: [Authentication]
      summary: Get authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
        '401':
          description: Unauthenticated

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Logout and revoke token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out

  /motorcycles:
    get:
      tags: [Motorcycles]
      summary: List user's motorcycles
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: brand
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: per_page
          schema:
            type: integer
      responses:
        '200':
          description: Motorcycle list with pagination

    post:
      tags: [Motorcycles]
      summary: Create a new motorcycle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [brand, model, year]
              properties:
                brand:
                  type: string
                model:
                  type: string
                year:
                  type: integer
                color:
                  type: string
                license_plate:
                  type: string
                engine_cc:
                  type: integer
                transmission:
                  type: string
                  enum: [automatic, manual, cvt]
                fuel_type:
                  type: string
                odometer_km:
                  type: integer
      responses:
        '201':
          description: Motorcycle created

  /motorcycles/{id}:
    get:
      tags: [Motorcycles]
      summary: Get motorcycle detail
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Motorcycle details
        '403':
          description: Access denied
        '404':
          description: Not found

    put:
      tags: [Motorcycles]
      summary: Update motorcycle
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Motorcycle updated

    delete:
      tags: [Motorcycles]
      summary: Soft delete motorcycle
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Motorcycle deleted

  /motorcycles/{id}/toggle-favorite:
    post:
      tags: [Motorcycles]
      summary: Toggle favorite status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Favorite toggled

  /motorcycles/{id}/odometer:
    put:
      tags: [Motorcycles]
      summary: Update odometer reading
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [odometer_km]
              properties:
                odometer_km:
                  type: integer
      responses:
        '200':
          description: Odometer updated

  /troubleshooting/analyze:
    post:
      tags: [AI - Troubleshooting]
      summary: Analyze motorcycle problem via AI
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [motorcycle_id, problem_description]
              properties:
                motorcycle_id:
                  type: integer
                problem_description:
                  type: string
                symptoms:
                  type: string
      responses:
        '201':
          description: Problem analysis complete
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/TroubleshootingResult'

  /troubleshooting/{motorcycle}/history:
    get:
      tags: [AI - Troubleshooting]
      summary: Get troubleshooting history
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: motorcycle
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: History list

  /maintenance/recommendations/{motorcycle}:
    get:
      tags: [AI - Maintenance]
      summary: Get AI maintenance recommendations
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: motorcycle
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Recommendations

  /maintenance/predict/{motorcycle}:
    get:
      tags: [AI - Maintenance]
      summary: Predict next maintenance
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: motorcycle
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Prediction result

  /maintenance:
    post:
      tags: [AI - Maintenance]
      summary: Log a maintenance record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [motorcycle_id, type, odometer_km, maintenance_date]
              properties:
                motorcycle_id:
                  type: integer
                type:
                  type: string
                description:
                  type: string
                odometer_km:
                  type: integer
                maintenance_date:
                  type: string
                  format: date
                cost:
                  type: number
                workshop:
                  type: string
                status:
                  type: string
                  enum: [scheduled, completed, pending]
      responses:
        '201':
          description: Maintenance recorded

  /motorcycles/{motorcycle}/compare/{comparedMotorcycle}:
    get:
      tags: [AI - Comparison]
      summary: Compare two motorcycles
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: motorcycle
          required: true
          schema:
            type: integer
        - in: path
          name: comparedMotorcycle
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Comparison result

  /comparisons/{motorcycle}/history:
    get:
      tags: [AI - Comparison]
      summary: Get comparison history
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: motorcycle
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: History list

  /workshops/search:
    get:
      tags: [Workshops]
      summary: Search workshops
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: city
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: min_rating
          schema:
            type: number
        - in: query
          name: latitude
          schema:
            type: number
        - in: query
          name: longitude
          schema:
            type: number
        - in: query
          name: radius
          schema:
            type: integer
      responses:
        '200':
          description: Workshop list

  /workshops/{id}:
    get:
      tags: [Workshops]
      summary: Get workshop detail
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Workshop details
        '404':
          description: Workshop not found
